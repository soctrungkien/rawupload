<body class="bg-gray-900 text-white min-h-screen p-6 font-mono">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">rawupload</h1>

<button id="fullscreenBtn" class="absolute top-2 right-2 hidden md:flex items-center justify-center w-9 h-9 rounded-full border border-neutral-300 bg-neutral-200 dark:border-neutral-700 dark:bg-neutral-800 hover:bg-neutral-300 dark:hover:bg-neutral-700 transition-colors z-[10000]" style="">
⛶
</button>
    <div id="editor" style='overflow: hidden;' style="background-color: rgb(16, 16, 16);" class="bg-neutral-950 h-64 w-full rounded border border-gray-700 mb-4"></div>

<div class="mt-3 flex flex-wrap gap-3 items-center">
    <select id="serverSelect" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white outline-none cursor-pointer">
        <option value="friendpaste">friendpaste.com</option>
        <option value="thezomg">paste.thezomg.com</option>
        <option value="paste_rs">paste.rs</option>
        <option value="pastebdn">cdn.pastebdn.workers.dev</option>
        <option value="pastefy">pastefy.app</option>
    </select>

    <button onclick="createPaste()"
        class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-bold transition">
        Tạo Page
    </button>

    <label class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded cursor-pointer transition">
        <input type="file" id="uploadFile1" class="hidden">
        Chọn File
    </label>

    <button onclick="urlrawinload()"
        class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded transition">
        URL
    </button>
</div>

    <div id="result" class="mt-4 text-green-400"></div>
    <div id="error" class="mt-2 text-red-400"></div>
  </div>

<script>
  const editorfull = document.getElementById("editor");
  const btn = document.getElementById("fullscreenBtn");

  function toggleAceEditor() {
    editorfull.classList.toggle("ace_editor");
    editorfull.classList.toggle("w-screen");
    editorfull.classList.toggle("h-screen");
  }

  btn.addEventListener("click", () => {
	toggleAceEditor();
if (editorfull.classList.contains("ace_editor")) {
document.body.style.overflow = "auto";
} else {
document.body.style.overflow = "hidden";
}
  });

    const editor = ace.edit("editor");
    editor.setShowPrintMargin(false);
    document.getElementById('editor').style.fontSize = '14px';
    editor.setTheme("ace/theme/monokai");
    editor.setHighlightActiveLine(true),
    editor.setOptions({
        enableBasicAutocompletion: true,
        enableSnippets: true,
        enableLiveAutocompletion: true,
        fontFamily: 'Azeret Mono'
    });

async function friendpaste_com(data) {
    try {
        const response = await fetch("https://www.friendpaste.com/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                snippet: data,
                language: "text"
            })
        });

        if (!response.ok) {
            return response.status.toString();
        }

        const result = await response.json();

        if (result.ok && result.url && result.rev) {
            return `${result.url}/raw?rev=${result.rev}`;
        }

        return result.reason || "ERROR";

    } catch (error) {
        console.error(error);
        return "FETCH_ERROR";
    }
}
async function paste_thezomg_com(data) {
 try {
 const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://paste.thezomg.com/'), {
 method: 'POST',
 headers: {
 'Content-Type': 'application/x-www-form-urlencoded'
 },
 body: new URLSearchParams({
 paste_data: data,
 paste_lang: 'text',
 api_submit: 'true',
 mode: 'json',
 paste_expire: '0'
 })
 });
 if (!response.ok) {
 return response.status.toString();
 }
 const result = await response.json();
 if (result.result && result.result.id) {
 const id = result.result.id;
 const hash = result.result.hash ? `${result.result.hash}/` : '';
 return `https://paste.thezomg.com/${id}/${hash}raw/`;
 }
 return result.error || 'ERROR';
 } catch (error) {
 return 'FETCH_ERROR';
 }
}
async function paste_rs(data) {
 try {
 const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://paste.rs/'), {
 method: 'POST',
 body: data
 });
 if (response.status === 201 || response.status === 206) {
 const result = await response.text();
 return result.trim();
 }
 return response.status.toString();
 } catch (error) {
 return 'FETCH_ERROR';
 }
}
async function cdn_pastebdn_workers_dev(data) {
 try {
 const response = await fetch('https://cdn.pastebdn.workers.dev/api', {
 method: 'POST',
 body: data
 });
 if (!response.ok) {
 return response.status.toString();
 }
 const result = await response.json();
 if (result && result.id) {
 return `https://cdn.pastebdn.workers.dev/raw/${result.id}`;
 }
 return 'ERROR';
 } catch (error) {
 return 'FETCH_ERROR';
 }
}
async function pastefy_app(data) {
  try {
    const response = await fetch("https://project-33dtd.vercel.app/api/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content: data
      })
    });

    return (await response.text()).trim();
  } catch (err) {
    console.error(err);
    return "FETCH_ERROR: " + err.message;
  }
	}

    async function createPaste() {
      const content = editor.getValue().trim();
      const selectedServer = document.getElementById("serverSelect").value;
      const resultDiv = document.getElementById("result");
      const errorDiv = document.getElementById("error");
      
      resultDiv.textContent = '';
      errorDiv.textContent = '';

      if (!content) {
        errorDiv.textContent = "⚠️ Bạn chưa nhập nội dung paste!";
        return;
      }

      const start = performance.now();
      resultDiv.innerHTML = "⏳ Đang upload lên hệ thống...";

      let finalUrl = "";

      // Kiểm tra và thực thi theo server được chọn
      if (selectedServer === "friendpaste") {
          finalUrl = await friendpaste_com(content);
      } else if (selectedServer === "thezomg") {
          finalUrl = await paste_thezomg_com(content);
      } else if (selectedServer === "paste_rs") {
          finalUrl = await paste_rs(content);
      } else if (selectedServer === "pastebdn") {
          finalUrl = await cdn_pastebdn_workers_dev(content);
      } else if (selectedServer === "pastefy") {
          finalUrl = await pastefy_app(content);
      }

      const end = performance.now();
      const timeTaken = (end - start).toFixed(2);

      // Xử lý output đầu ra hiển thị
      if (finalUrl && !finalUrl.includes("ERROR") && !finalUrl.includes("FETCH_ERROR")) {
          resultDiv.innerHTML = `
            📄 Link: <a href="${finalUrl}" target="_blank" class="underline text-green-400 font-bold" style="word-break: break-all">${finalUrl}</a><br>
            ⏱️ Mất ${timeTaken}ms để upload qua <b>${selectedServer}</b>.
          `;
      } else {
          resultDiv.textContent = "";
          errorDiv.textContent = `❌ Upload thất bại. Mã/Lý do lỗi: ${finalUrl}`;
      }
    }

const fileInput = document.getElementById('uploadFile1');

// Khi chọn file
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;

  // Đọc nội dung file (giả định là text)
  const reader = new FileReader();
  reader.onload = function(e) {
    editor.setValue(e.target.result, -1); // Load nội dung vào Ace editor
  }
  reader.readAsText(file);
});

async function urlrawinload() {
  const url = prompt("Nhập url raw");
  if (!url) {
    console.log("Bạn chưa nhập URL");
    return;
  }

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    editor.setValue(text, -1);

  } catch (err) {
    console.error("Lỗi khi lấy raw content:", err.message);
  }
}

editor.getSession().setUseWrapMode(true);             // tự động xuống dòng
editor.setShowFoldWidgets(false);                     // tắt biểu tượng fold
editor.setOption("foldStyle", "manual");              // không tự động fold
editor.session.setOption("maxTokenCount", 100000);    // tăng giới hạn token
  </script>
